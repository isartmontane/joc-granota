<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Joc Granota">
    <title>Joc de la Granota</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #000;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        canvas {
            display: block;
            background: green;
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
        }

        #controls {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            border: 3px solid white;
            color: white;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            -webkit-touch-callout: none;
            user-select: none;
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <button class="btn" id="btnUp">⬆️</button>
            <button class="btn" id="btnLeft">⬅️</button>
            <button class="btn" id="btnDown">⬇️</button>
            <button class="btn" id="btnRight">➡️</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const SCREEN_WIDTH = 800;
        const SCREEN_HEIGHT = 600;

        // Set canvas resolution
        canvas.width = SCREEN_WIDTH;
        canvas.height = SCREEN_HEIGHT;

        // Game variables
        let gameState = "JUGANT";
        let vides = 3;
        let puntuacio = 0;
        let t0 = Date.now();
        let tActual = 0;

        let granota = { x: 400, y: 550, amp: 40, al: 40, v: 6 };

        let keys = { up: false, down: false, left: false, right: false };

        // Cars
        let cotxe1 = {x: 50, y: 120, amp: 45, al: 25, v: 6.5, color: 'yellow', carrils: [120, 180], carril: 0, canvi_timer: 0, tipus: 'normal'};
        let cotxe2 = {x: 800, y: 180, amp: 65, al: 25, v: -8, color: 'red', carrils: [180, 240], carril: 0, canvi_timer: 0, tipus: 'normal'};
        let cotxe3 = {x: 150, y: 240, amp: 45, al: 25, v: 9, color: 'blue', carrils: [240, 300], carril: 0, canvi_timer: 0, tipus: 'normal'};
        let cotxe4 = {x: 600, y: 300, amp: 55, al: 25, v: -5.5, color: 'orange', carrils: [300, 360], carril: 0, canvi_timer: 0, tipus: 'normal'};
        let cotxe5 = {x: 300, y: 360, amp: 50, al: 25, v: 10, color: 'purple', carrils: [360, 410], carril: 0, canvi_timer: 0, tipus: 'normal'};
        let cotxe6 = {x: 0, y: 420, amp: 50, al: 25, v: 8, color: 'cyan', carrils: [410, 360], carril: 0, canvi_timer: 0, tipus: 'normal'};
        let camio1 = {x: -100, y: 200, amp: 90, al: 30, v: 4.5, color: 'brown', carrils: [180, 240], carril: 0, canvi_timer: 0, tipus: 'camio', visible: false, aparicio_timer: 0};
        let camio2 = {x: 800, y: 320, amp: 90, al: 30, v: -6, color: 'darkred', carrils: [300, 360], carril: 0, canvi_timer: 0, tipus: 'camio', visible: false, aparicio_timer: 150};
        let moto1 = {x: 400, y: 280, amp: 25, al: 15, v: -11, color: 'red', carrils: [270, 300], carril: 0, canvi_timer: 0, tipus: 'moto'};
        let moto2 = {x: 100, y: 350, amp: 25, al: 15, v: 10, color: 'green', carrils: [340, 380], carril: 0, canvi_timer: 0, tipus: 'moto'};

        let cotxes = [cotxe1, cotxe2, cotxe3, cotxe4, cotxe5, cotxe6, camio1, camio2, moto1, moto2];
        let carrils_y = [110, 170, 230, 290, 350, 410];

        let monedes = [];
        let moneda_spawn_timer = 0;

        // Sound
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq1, freq2, duration) {
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
            osc.frequency.setValueAtTime(freq1, now);
            if (freq2) osc.frequency.setValueAtTime(freq2, now + duration / 2);
            osc.start(now);
            osc.stop(now + duration);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') keys.up = true;
            if (e.key === 'ArrowDown') keys.down = true;
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
            if (e.key === ' ') resetGame();
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp') keys.up = false;
            if (e.key === 'ArrowDown') keys.down = false;
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
        });

        // Touch controls
        document.getElementById('btnUp').addEventListener('touchstart', () => keys.up = true);
        document.getElementById('btnUp').addEventListener('touchend', () => keys.up = false);
        document.getElementById('btnDown').addEventListener('touchstart', () => keys.down = true);
        document.getElementById('btnDown').addEventListener('touchend', () => keys.down = false);
        document.getElementById('btnLeft').addEventListener('touchstart', () => keys.left = true);
        document.getElementById('btnLeft').addEventListener('touchend', () => keys.left = false);
        document.getElementById('btnRight').addEventListener('touchstart', () => keys.right = true);
        document.getElementById('btnRight').addEventListener('touchend', () => keys.right = false);

        function collision(granota, obj) {
            return granota.x < obj.x + obj.amp && granota.x + granota.amp > obj.x && granota.y < obj.y + obj.al && granota.y + granota.al > obj.y;
        }

        function drawCar(c) {
            if (c.visible === false) return;
            ctx.fillStyle = c.color;
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.fillRect(c.x, c.y + 8, c.amp, c.al - 10);
            ctx.strokeRect(c.x, c.y + 8, c.amp, c.al - 10);
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(c.x + 5, c.y + c.al - 1, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(c.x + c.amp - 5, c.y + c.al - 1, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawFrog(g) {
            ctx.fillStyle = 'limegreen';
            ctx.fillRect(g.x + 5, g.y + 10, g.amp - 10, g.al - 15);
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(g.x + 12, g.y + 5, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(g.x + 28, g.y + 5, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCoin(m) {
            ctx.fillStyle = 'gold';
            ctx.strokeStyle = 'orange';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(m.x + m.mida / 2, m.y + m.mida / 2, m.mida / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        }

        function resetGame() {
            if (gameState !== 'JUGANT') {
                gameState = 'JUGANT';
                vides = 3;
                puntuacio = 0;
                monedes = [];
                t0 = Date.now();
                granota = { x: 400, y: 550, amp: 40, al: 40, v: 6 };
            }
        }

        // Game loop
        let lastTime = 0;
        function update(currentTime) {
            if (currentTime - lastTime < 25) {
                requestAnimationFrame(update);
                return;
            }
            lastTime = currentTime;

            // Clear
            ctx.fillStyle = 'green';
            ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);

            // Road
            ctx.fillStyle = '#333333';
            ctx.fillRect(0, 100, SCREEN_WIDTH, 350);
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            for (let i = 0; i < carrils_y.length - 1; i++) {
                const y = carrils_y[i] + 40;
                for (let x = 0; x < SCREEN_WIDTH; x += 40) {
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + 20, y);
                    ctx.stroke();
                }
            }

            if (gameState === 'JUGANT') {
                // Coins
                moneda_spawn_timer++;
                if (moneda_spawn_timer > 80) {
                    monedes.push({ x: Math.random() * 750, y: Math.random() * 280 + 120, mida: 15, timer: 0 });
                    moneda_spawn_timer = 0;
                }
                monedes = monedes.filter(m => { m.timer++; return m.timer < 300; });

                // Move frog
                if (keys.up) granota.y -= granota.v;
                if (keys.down) granota.y += granota.v;
                if (keys.left) granota.x -= granota.v;
                if (keys.right) granota.x += granota.v;
                granota.x = Math.max(0, Math.min(granota.x, SCREEN_WIDTH - granota.amp));
                granota.y = Math.max(0, Math.min(granota.y, SCREEN_HEIGHT - granota.al));

                // Move cars
                cotxes.forEach(c => {
                    if (c.tipus === 'camio') {
                        c.aparicio_timer++;
                        c.visible = c.aparicio_timer < 200;
                        if (c.aparicio_timer > 600) c.aparicio_timer = 0;
                    }
                    c.x += c.v;
                    if (c.v > 0 && c.x > SCREEN_WIDTH) c.x = -c.amp;
                    if (c.v < 0 && c.x + c.amp < 0) c.x = SCREEN_WIDTH;
                    c.canvi_timer++;
                    if (c.canvi_timer >= 50 + (c.y % 30)) {
                        c.carril = 1 - c.carril;
                        c.canvi_timer = 0;
                    }
                    const targetY = c.carrils[c.carril];
                    if (c.y < targetY - 0.5) c.y += 1.5;
                    else if (c.y > targetY + 0.5) c.y -= 1.5;
                    else c.y = targetY;
                });

                // Collisions
                cotxes.forEach(c => {
                    if (c.visible !== false && collision(granota, c)) {
                        playSound(800, 100, 0.3);
                        vides--;
                        if (vides <= 0) {
                            gameState = 'GAME_OVER';
                            playSound(262, 196, 0.8);
                        } else {
                            granota = { x: 400, y: 550, amp: 40, al: 40, v: 6 };
                        }
                    }
                });

                // Coins collision
                monedes = monedes.filter(m => {
                    if (collision(granota, {x: m.x, y: m.y, amp: m.mida, al: m.mida})) {
                        puntuacio += 10;
                        return false;
                    }
                    return true;
                });

                // Win
                if (granota.y <= 60) {
                    gameState = 'GUANYAT';
                    playSound(523, 659, 0.6);
                }

                tActual = ((Date.now() - t0) / 1000).toFixed(1);
            }

            // Draw
            cotxes.forEach(c => drawCar(c));
            drawFrog(granota);
            monedes.forEach(m => drawCoin(m));

            // UI
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('VIDES: ' + '❤️ '.repeat(vides), 10, 30);
            ctx.textAlign = 'right';
            ctx.fillText('TEMPS: ' + tActual + 's', SCREEN_WIDTH - 10, 30);
            ctx.textAlign = 'center';
            ctx.fillStyle = 'gold';
            ctx.fillText('MONEDES: ' + puntuacio, SCREEN_WIDTH / 2, 30);
            ctx.textAlign = 'left';

            // End screens
            if (gameState === 'GUANYAT') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(150, 200, 500, 200);
                ctx.fillStyle = 'lime';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('HAS GUANYAT!!', SCREEN_WIDTH / 2, 270);
                ctx.fillStyle = 'white';
                ctx.font = '16px Arial';
                ctx.fillText('TEMPS: ' + tActual + 's', SCREEN_WIDTH / 2, 310);
                ctx.fillStyle = 'yellow';
                ctx.font = '14px Arial';
                ctx.fillText('Prem ESPAI per reiniciar', SCREEN_WIDTH / 2, 340);
            } else if (gameState === 'GAME_OVER') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(150, 200, 500, 200);
                ctx.fillStyle = 'red';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', SCREEN_WIDTH / 2, 290);
                ctx.fillStyle = 'yellow';
                ctx.font = '14px Arial';
                ctx.fillText('Prem ESPAI per reiniciar', SCREEN_WIDTH / 2, 340);
            }

            requestAnimationFrame(update);
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
